<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Varendra University</title>
  <meta name="description" content="Varendra University official website and Student Feedback Review System access portal.">
  <noscript>
    <meta http-equiv="refresh" content="0; url=/vu/">
  </noscript>
  <style>
    :root {
      color-scheme: light;
      font-family: "Segoe UI", sans-serif;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: linear-gradient(180deg, #f5f7fa 0%, #eef2f7 100%);
      color: #17324b;
    }

    .loader-card {
      width: min(92vw, 34rem);
      padding: 2rem;
      border-radius: 1.25rem;
      background: #ffffff;
      box-shadow: 0 18px 50px rgba(23, 50, 75, 0.12);
      text-align: center;
    }

    .loader-mark {
      width: 3rem;
      height: 3rem;
      margin: 0 auto 1rem;
      border-radius: 999px;
      border: 4px solid rgba(23, 50, 75, 0.15);
      border-top-color: #c75a36;
      animation: spin 0.8s linear infinite;
    }

    h1 {
      margin: 0 0 0.75rem;
      font-size: 1.5rem;
    }

    p {
      margin: 0;
      line-height: 1.6;
      color: #4f6478;
    }

    .actions {
      margin-top: 1.25rem;
      display: flex;
      gap: 0.75rem;
      justify-content: center;
      flex-wrap: wrap;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 0.8rem 1.1rem;
      border-radius: 999px;
      text-decoration: none;
      font-weight: 600;
    }

    .btn-primary {
      background: #17324b;
      color: #fff;
    }

    .btn-secondary {
      background: #f4ede8;
      color: #c75a36;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <main class="loader-card">
    <div class="loader-mark" aria-hidden="true"></div>
    <h1 id="loader-title">Opening Varendra University</h1>
    <p id="loader-copy">The VU homepage is loading at the root domain. If it takes a moment, you can still open the feedback portal directly.</p>
    <div class="actions" id="loader-actions" hidden>
      <a class="btn btn-primary" href="/vu/">Open VU Site</a>
      <a class="btn btn-secondary" href="/feedback/">Open Feedback Portal</a>
    </div>
  </main>

  <script>
    (async function loadVuHomepage() {
      try {
        const response = await fetch("vu/index.html", { cache: "no-store" });
        if (!response.ok) {
          throw new Error("Failed to load vu/index.html");
        }

        let html = await response.text();
        html = html.replace(/<base[^>]*href=["'][^"']*["'][^>]*>/i, '<base href="/vu/">');
        html = html.replace(/href="\.\//g, 'href="/"');
        html = html.replace(/href='\.\//g, "href='/'");

        document.open();
        document.write("<!DOCTYPE html>\n" + html);
        document.close();
      } catch (error) {
        document.getElementById("loader-title").textContent = "VU homepage could not be loaded";
        document.getElementById("loader-copy").textContent = "You can open the VU mirror directly or continue to the Student Feedback Review System portal.";
        document.getElementById("loader-actions").hidden = false;
        console.error(error);
      }
    })();
  </script>
</body>
</html>

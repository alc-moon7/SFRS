<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Student Feedback Review System - SFRS</title>
  <meta name="description" content="Student Feedback Review System access portal for Varendra University.">
  <noscript>
    <meta http-equiv="refresh" content="0; url=/feedback/">
  </noscript>
  <style>
    @import url("https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap");

    :root {
      color-scheme: light;
      font-family: "Inter", system-ui, sans-serif;
      --primary: #0f172a;
      --accent: #2563eb;
      --background: #f8fafc;
      --border: #e2e8f0;
      --muted: #64748b;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: var(--background);
      color: var(--primary);
    }

    .loader-card {
      width: min(92vw, 34rem);
      padding: 2rem;
      border: 1px solid var(--border);
      border-radius: 20px;
      background: #ffffff;
      box-shadow: 0 16px 38px rgba(15, 23, 42, 0.08);
      text-align: center;
    }

    .loader-mark {
      width: 3rem;
      height: 3rem;
      margin: 0 auto 1rem;
      border-radius: 999px;
      border: 4px solid rgba(37, 99, 235, 0.16);
      border-top-color: var(--accent);
      animation: spin 0.8s linear infinite;
    }

    h1 {
      margin: 0 0 0.75rem;
      font-size: 1.5rem;
    }

    p {
      margin: 0;
      line-height: 1.6;
      color: var(--muted);
    }

    .actions {
      margin-top: 1.25rem;
      display: flex;
      gap: 0.75rem;
      justify-content: center;
      flex-wrap: wrap;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 0.8rem 1.1rem;
      border-radius: 999px;
      text-decoration: none;
      font-weight: 600;
    }

    .btn-primary {
      background: var(--accent);
      color: #fff;
    }

    .btn-secondary {
      background: #eef4ff;
      color: var(--accent);
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <main class="loader-card">
    <div class="loader-mark" aria-hidden="true"></div>
    <h1 id="loader-title">Opening SFRS</h1>
    <p id="loader-copy">The Student Feedback Review System is loading. The VU mirror remains available from its own path.</p>
    <div class="actions" id="loader-actions" hidden>
      <a class="btn btn-primary" href="/feedback/">Open Feedback Portal</a>
      <a class="btn btn-secondary" href="/vu/">Open VU Site</a>
    </div>
  </main>

  <script>
    (async function loadFeedbackPortal() {
      try {
        const response = await fetch("feedback/index.html", { cache: "no-store" });
        if (!response.ok) {
          throw new Error("Failed to load feedback/index.html");
        }

        let html = await response.text();
        html = html.replace(/<base[^>]*href=["'][^"']*["'][^>]*>/i, "");
        html = html.replace(/<head>/i, '<head>\n  <base href="/feedback/">');

        document.open();
        document.write("<!DOCTYPE html>\n" + html);
        document.close();
      } catch (error) {
        document.getElementById("loader-title").textContent = "SFRS could not be loaded";
        document.getElementById("loader-copy").textContent = "You can open the feedback portal directly or visit the VU mirror from its own path.";
        document.getElementById("loader-actions").hidden = false;
        console.error(error);
      }
    })();
  </script>
</body>
</html>
